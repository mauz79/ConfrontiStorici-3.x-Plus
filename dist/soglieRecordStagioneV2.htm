<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
  <title>Record Soglie - Stagione V2</title>

  <script src="persjs/fcmSoglieRecordFunzioni.js" type="text/javascript"></script>
  <script src="persjs/fcmConfrontiDati.js" type="text/javascript"></script>
  <script src="persjs/fcmSoglieRecordConfigPlus.js" type="text/javascript"></script>
  <script src="persjs/fcmSoglieRecordVisteV2.js" type="text/javascript"></script>

  <link href="fcmmael.css" rel="stylesheet" type="text/css">
  <base target="_self">

  <style type="text/css">
    body { font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
    .srv-box { border: 1px solid #2323B3; background: #CCFFFF; padding: 12px; }
    .srv-filtri { border: 1px solid #999; background: #FFFFE0; padding: 8px; margin: 10px 0 14px 0; }
    .srv-note { border: 1px solid #999; background: #F5F5F5; padding: 8px; margin: 10px 0 14px 0; line-height: 1.45em; }
    .srv-tabs { margin: 10px 0 10px 0; }
    .srv-tabs input { font-size: 12px; margin-right: 6px; }
    table.tb { border-collapse: collapse; width: 100%; margin-bottom: 18px; background: #FFFFFF; }
    table.tb th { background: #2323B3; color: #FFFFFF; padding: 4px; border: 1px solid #666; text-align: center; }
    table.tb td { padding: 4px; border: 1px solid #999; vertical-align: top; }
    .num { text-align: right; white-space: nowrap; }
    .cen { text-align: center; white-space: nowrap; }
    .good { font-weight: bold; }
    select { font-size: 12px; }
  </style>

  <script type="text/javascript">
    var SRV_STAGIONE_VISTA = null;

    function InitStagioneV2() {
      SRVFillStagioni("filtroStagione");
      SRVFillCompetizioni("filtroCompetizione", parseInt(document.getElementById("filtroStagione").value, 10), true);
      SRVFillRecord("filtroRecord", true);

      document.getElementById("filtroStagione").onchange = function() {
        SRVFillCompetizioni("filtroCompetizione", parseInt(document.getElementById("filtroStagione").value, 10), true);
        RenderStagioneV2();
      };

      document.getElementById("filtroCompetizione").onchange = RenderStagioneV2;
      document.getElementById("filtroRecord").onchange = RenderStagioneV2;
      document.getElementById("filtroSquadra").onchange = RenderStagioneV2;
      document.getElementById("filtroNumero").onchange = RenderStagioneV2;

      RenderStagioneV2();
      SRVSetTab("tabDettaglio");
    }

    function RenderStagioneV2() {
      var stagione = parseInt(document.getElementById("filtroStagione").value, 10);
      var compId = parseInt(document.getElementById("filtroCompetizione").value, 10);
      var record = document.getElementById("filtroRecord").value;
      var squadra = document.getElementById("filtroSquadra").value;
      var topN = SRVFiltroNumero("filtroNumero");

      SRV_STAGIONE_VISTA = SRVAnalizzaVista(stagione, compId);

      SRVFillSquadre("filtroSquadra", SRV_STAGIONE_VISTA.stats, true);
      document.getElementById("filtroSquadra").value = squadra;
      if (document.getElementById("filtroSquadra").selectedIndex < 0) {
        document.getElementById("filtroSquadra").value = "";
        squadra = "";
      }

      var titoloComp = "Tutte le competizioni";
      if (compId != 0) titoloComp = SRVNomeCompetizione(compId);

      document.getElementById("infoFiltro").innerHTML =
        "<b>Stagione:</b> " + stagione +
        " - <b>Competizione:</b> " + SRVH(titoloComp) +
        " - <b>Partite analizzate:</b> " + SRV_STAGIONE_VISTA.partite;

      SRVRenderDettaglio("contenutoDettaglio", SRV_STAGIONE_VISTA, record, squadra, topN);
      SRVRenderRiepilogo("contenutoRiepilogo", SRV_STAGIONE_VISTA, squadra);
    }
  </script>
</head>

<body onload="InitStagioneV2();">
  <div class="srv-box">
    <h2>Record Soglie - Singola Stagione V2</h2>

    <p>
      Vista nuova con filtri, schede separate e nomi reali delle competizioni.
      Pagine di controllo:
      <a href="soglieRecord.htm">base</a> |
      <a href="soglieRecordStagione.htm">stagione vecchia</a> |
      <a href="soglieRecordStoricoV2.htm">storico V2</a>.
    </p>

    <div class="srv-filtri">
      <b>Filtri</b><br><br>

      Stagione:
      <select id="filtroStagione"></select>

      &nbsp;&nbsp;

      Competizione:
      <select id="filtroCompetizione"></select>

      &nbsp;&nbsp;

      Record:
      <select id="filtroRecord"></select>

      &nbsp;&nbsp;

      Squadra:
      <select id="filtroSquadra"></select>

      &nbsp;&nbsp;

      Mostra:
      <select id="filtroNumero">
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="tutti">tutti</option>
      </select>
    </div>

    <div class="srv-note" id="infoFiltro"></div>

    <div class="srv-tabs">
      <input type="button" value="Dettaglio record" onclick="SRVSetTab('tabDettaglio');">
      <input type="button" value="Riepilogo numerico" onclick="SRVSetTab('tabRiepilogo');">
    </div>

    <div id="tabDettaglio" class="srv-tab">
      <div id="contenutoDettaglio"></div>
    </div>

    <div id="tabRiepilogo" class="srv-tab">
      <div id="contenutoRiepilogo"></div>
    </div>
  </div>
</body>
</html>

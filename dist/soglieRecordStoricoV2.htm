<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
  <title>Record Soglie - Storico V2</title>

  <script src="persjs/fcmSoglieRecordFunzioni.js" type="text/javascript"></script>
  <script src="persjs/fcmConfrontiDati.js" type="text/javascript"></script>
  <script src="persjs/fcmSoglieRecordVisteV2.js" type="text/javascript"></script>

  <link href="fcmmael.css" rel="stylesheet" type="text/css">
  <base target="_self">

  <style type="text/css">
    body { font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
    .srv-box { border: 1px solid #2323B3; background: #CCFFFF; padding: 12px; }
    .srv-filtri { border: 1px solid #999; background: #FFFFE0; padding: 8px; margin: 10px 0 14px 0; }
    .srv-note { border: 1px solid #999; background: #F5F5F5; padding: 8px; margin: 10px 0 14px 0; line-height: 1.45em; }
    .srv-tabs { margin: 10px 0 10px 0; }
    .srv-tabs input { font-size: 12px; margin-right: 6px; }
    table.tb { border-collapse: collapse; width: 100%; margin-bottom: 18px; background: #FFFFFF; }
    table.tb th { background: #2323B3; color: #FFFFFF; padding: 4px; border: 1px solid #666; text-align: center; }
    table.tb td { padding: 4px; border: 1px solid #999; vertical-align: top; }
    .num { text-align: right; white-space: nowrap; }
    .cen { text-align: center; white-space: nowrap; }
    .good { font-weight: bold; }
    select { font-size: 12px; }
  </style>

  <script type="text/javascript">
    var SRV_STORICO_VISTA = null;

    function InitStoricoV2() {
      try {
        SRVFillCompetizioni("filtroCompetizione", 0, true);
        SRVFillMetriche("filtroRecordStorico");

        document.getElementById("filtroCompetizione").onchange = RenderStoricoV2;
        document.getElementById("filtroRecordStorico").onchange = RenderStoricoV2;
        document.getElementById("filtroSquadreStorico").onchange = RenderStoricoV2;
        document.getElementById("filtroNumero").onchange = RenderStoricoV2;

        RenderStoricoV2();
        SRVSetTab("tabClassifiche");
      } catch(e) {
        document.getElementById("errorePagina").innerHTML = "<b>Errore JavaScript:</b> " + e.message;
      }
    }

    function RenderStoricoV2() {
      try {
        var compId = parseInt(document.getElementById("filtroCompetizione").value, 10);
        var metrica = document.getElementById("filtroRecordStorico").value;
        var filtroSquadre = document.getElementById("filtroSquadreStorico").value;
        var topN = SRVFiltroNumero("filtroNumero");

        SRV_STORICO_VISTA = SRVAnalizzaVista(0, compId);

        var titoloComp = "Tutte le competizioni";
        if (compId != 0) titoloComp = SRVNomeCompetizione(compId);

        document.getElementById("infoFiltro").innerHTML =
          "<b>Storico completo</b>" +
          " - <b>Competizione:</b> " + SRVH(titoloComp) +
          " - <b>Partite analizzate:</b> " + SRV_STORICO_VISTA.partite +
          " - <b>Squadre:</b> " + (filtroSquadre == "attuali" ? "solo attuali" : "tutte");

        SRVRenderClassifica("contenutoClassifiche", SRV_STORICO_VISTA, metrica, filtroSquadre, topN);
        SRVRenderRiepilogo("contenutoRiepilogo", SRV_STORICO_VISTA, "");
        document.getElementById("errorePagina").innerHTML = "";
      } catch(e) {
        document.getElementById("errorePagina").innerHTML = "<b>Errore JavaScript:</b> " + e.message;
      }
    }
  </script>
</head>

<body onload="InitStoricoV2();">
  <div class="srv-box">
    <h2>Record Soglie - Storico V2</h2>

    <p>
      Vista storica con filtro competizione, filtro squadre attuali/tutte, schede separate e riepilogo numerico.
      Pagine di controllo:
      <a href="soglieRecord.htm">base</a> |
      <a href="soglieRecordStorico.htm">storico vecchio</a> |
      <a href="soglieRecordStagioneV2.htm">stagione V2</a>.
    </p>

    <div class="srv-filtri">
      <b>Filtri</b><br><br>

      Competizione:
      <select id="filtroCompetizione"></select>

      &nbsp;&nbsp;

      Record/classifica:
      <select id="filtroRecordStorico"></select>

      &nbsp;&nbsp;

      Squadre:
      <select id="filtroSquadreStorico">
        <option value="attuali" selected>solo squadre attuali</option>
        <option value="tutte">tutte le squadre</option>
      </select>

      &nbsp;&nbsp;

      Mostra:
      <select id="filtroNumero">
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="tutti">tutti</option>
      </select>
    </div>

    <div class="srv-note" id="errorePagina" style="color:red;"></div>
    <div class="srv-note" id="infoFiltro"></div>

    <div class="srv-tabs">
      <input type="button" value="Classifiche aggregate" onclick="SRVSetTab('tabClassifiche');">
      <input type="button" value="Riepilogo numerico" onclick="SRVSetTab('tabRiepilogo');">
    </div>

    <div id="tabClassifiche" class="srv-tab">
      <div id="contenutoClassifiche"></div>
    </div>

    <div id="tabRiepilogo" class="srv-tab">
      <div id="contenutoRiepilogo"></div>
    </div>
  </div>
</body>
</html>
